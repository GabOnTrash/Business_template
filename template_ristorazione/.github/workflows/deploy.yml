name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # Questo dice a GitHub di eseguire tutti i comandi dentro la sottocartella del progetto
    defaults:
      run:
        working-directory: ./ristoranti_pub

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          # Serve a GitHub per trovare il package-lock nella sottocartella per la cache
          cache-dependency-path: ./ristoranti_pub/package-lock.json

      - name: Installa dipendenze
        run: npm ci

      - name: Build del progetto React
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Carica la cartella dist corretta
        uses: actions/upload-pages-artifact@v3
        with:
          # Anche qui indichiamo il percorso completo partendo dalla root del repo
          path: './ristoranti_pub/dist'

      - name: Deploy definitivo su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4