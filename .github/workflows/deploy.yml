name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Si attiva quando pushi su main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # INDICA A GITHUB DI ENTRARE NELLA SOTTOCARTELLA PER TUTTI I COMANDI
    defaults:
      run:
        working-directory: ./template_ristorazione/ristoranti_pub

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # INDICA IL PERCORSO CORRETTO DEL FILE LOCK PER LA CACHE
          cache-dependency-path: ./template_ristorazione/ristoranti_pub/package-lock.json

      - name: Installa dipendenze
        run: npm ci

      - name: Build del progetto con variabili d'ambiente
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Carica l'artefatto della build
        uses: actions/upload-pages-artifact@v3
        with:
          # INDICA IL PERCORSO DELLA CARTELLA DIST DENTRO LA SOTTOCARTELLA
          path: './template_ristorazione/ristoranti_pub/dist'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4